<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>👶 生活小管家 - 日常編程</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Segoe UI','PingFang HK','Noto Sans HK',sans-serif;
    background:linear-gradient(145deg,#667eea 0%,#764ba2 100%);
    min-height:100vh;display:flex;justify-content:center;align-items:center;padding:10px;
  }
  .app{
    max-width:500px;width:100%;
    background:#fff;border-radius:32px;
    padding:20px 18px 22px;
    box-shadow:0 25px 60px rgba(0,0,0,0.3);
    overflow:hidden;
  }

  /* Header */
  .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .title{
    font-size:20px;font-weight:800;color:#333;
    display:flex;align-items:center;gap:6px;
  }
  .title .icon{font-size:24px}
  .lv-badge{
    background:#667eea;color:#fff;
    padding:4px 14px;border-radius:16px;font-size:13px;font-weight:700;
  }

  /* Scene */
  .scene-card{
    background:#f8f9ff;border-radius:24px;padding:16px;
    margin-bottom:12px;border:2px solid #e8ecf4;
  }
  .scene-header{display:flex;align-items:center;gap:12px;margin-bottom:8px}
  .scene-icon{font-size:40px;background:#fff;border-radius:18px;padding:6px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
  .scene-info{flex:1}
  .scene-title{font-size:17px;font-weight:800;color:#333}
  .scene-desc{font-size:13px;color:#888;margin-top:2px}
  .scene-desc strong{color:#667eea}

  /* Character area */
  .char-area{
    background:linear-gradient(135deg,#f0f4ff,#e8f0fe);
    border-radius:20px;padding:16px;text-align:center;
    margin-bottom:12px;min-height:100px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    position:relative;overflow:hidden;
  }
  .char-big{font-size:80px;transition:all 0.5s cubic-bezier(0.34,1.56,0.64,1)}
  .char-big.done{animation:popChar 0.5s ease}
  @keyframes popChar{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
  .char-result-text{
    font-size:16px;font-weight:700;color:#667eea;margin-top:4px;
  }

  /* Steps to order */
  .steps-area{margin-bottom:10px}
  .steps-label{
    font-size:12px;font-weight:700;color:#999;text-transform:uppercase;
    letter-spacing:1px;margin-bottom:6px;
  }
  .steps-tray{
    display:flex;gap:8px;flex-wrap:wrap;
    min-height:56px;padding:8px;
    background:#f0f4ff;border-radius:16px;
    border:2px dashed #d0d8e8;
  }
  .step-chip{
    display:flex;align-items:center;gap:6px;
    padding:8px 14px;border-radius:14px;font-size:14px;font-weight:700;
    cursor:pointer;transition:all 0.2s;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    user-select:none;touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
  }
  .step-chip:active{transform:scale(0.92)}
  .step-chip .emoji{font-size:20px}
  .step-tag{
    display:inline-flex;align-items:center;gap:6px;
    padding:8px 14px;border-radius:14px;font-size:14px;font-weight:700;
    color:#fff;
  }
  .step-tag .rm{
    margin-left:4px;background:rgba(255,255,255,0.2);
    border:none;border-radius:50%;width:18px;height:18px;
    font-size:10px;color:#fff;cursor:pointer;
  }

  /* Sequence row */
  .seq-row{
    display:flex;gap:4px;flex-wrap:wrap;align-items:center;
    min-height:46px;padding:6px;
    background:#fff;border-radius:14px;
    border:2px solid #e0e6f0;
  }
  .seq-slot{
    display:flex;align-items:center;gap:4px;
    padding:6px 12px;border-radius:12px;
    background:#667eea;color:#fff;font-size:13px;font-weight:700;
    position:relative;cursor:pointer;
  }
  .seq-slot .x{
    margin-left:4px;width:16px;height:16px;
    background:rgba(255,255,255,0.25);border:none;border-radius:50%;
    font-size:9px;color:#fff;cursor:pointer;
  }
  .seq-slot.active-slot{animation:slotPulse 0.4s ease;box-shadow:0 0 12px rgba(102,126,234,0.5)}
  @keyframes slotPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
  .seq-empty{color:#bbb;font-size:13px;padding:4px 0}
  .seq-arrow{color:#ccc;font-size:12px}

  /* Action hint */
  .action-hint{
    text-align:center;font-size:14px;font-weight:600;
    color:#999;margin-bottom:8px;min-height:20px;
  }
  .action-hint.ok{color:#4CAF50}
  .action-hint.fail{color:#f44336}

  /* Controls */
  .controls{display:flex;gap:8px}
  .ctrl{
    flex:1;padding:14px 0;border-radius:16px;border:none;
    font-size:17px;font-weight:800;cursor:pointer;transition:all 0.2s;
    -webkit-tap-highlight-color:transparent;touch-action:manipulation;
  }
  .ctrl:active{transform:scale(0.95)}
  .btn-check{
    background:linear-gradient(135deg,#667eea,#5a67d8);color:#fff;
    box-shadow:0 4px 15px rgba(102,126,234,0.3);
  }
  .btn-check:disabled{opacity:0.4;cursor:not-allowed}
  .btn-reset{
    background:#f0f4ff;color:#667eea;border:1px solid #d0d8e8;
  }
  .btn-next{
    display:none;
    background:linear-gradient(135deg,#48bb78,#38a169);color:#fff;
    box-shadow:0 4px 15px rgba(72,187,120,0.3);
  }
  .btn-next.show{display:block}

  /* Success overlay */
  .success-overlay{
    position:absolute;top:0;left:0;width:100%;height:100%;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(255,255,255,0.85);
    border-radius:20px;z-index:10;
    animation:fadeIn 0.4s ease;
  }
  @keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
  .success-overlay .big{font-size:60px}
  .success-overlay .msg{font-size:18px;font-weight:800;color:#48bb78;margin-top:8px}
  .success-overlay .sub{font-size:13px;color:#888;margin-top:4px}

  /* Stars */
  .stars{margin-top:8px;font-size:28px;letter-spacing:4px}

  /* Confetti */
  .cf-c{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:1000;overflow:hidden}
  .cf-p{
    position:absolute;width:8px;height:8px;opacity:0;
    animation:cfF 2.5s ease-out forwards;
  }
  @keyframes cfF{0%{transform:translateY(-10px);opacity:1}100%{transform:translateY(100vh);opacity:0}}
</style>
</head>
<body>

<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="title"><span class="icon">👶</span>生活小管家</div>
    <div class="lv-badge" id="lvBadge">第 1 關</div>
  </div>

  <!-- Scene -->
  <div class="scene-card">
    <div class="scene-header">
      <div class="scene-icon" id="sceneIcon">🌅</div>
      <div class="scene-info">
        <div class="scene-title" id="sceneTitle">早晨起床</div>
        <div class="scene-desc" id="sceneDesc">幫 <strong>小明</strong> 排好早晨嘅步驟</div>
      </div>
    </div>

    <!-- Character display -->
    <div class="char-area" id="charArea">
      <div class="char-big" id="charBig">😴</div>
      <div class="char-result-text" id="charResult"></div>
    </div>

    <!-- Steps to order -->
    <div class="steps-area">
      <div class="steps-label">🧩 步驟（㩒佢哋排次序）</div>
      <div class="steps-tray" id="stepsTray"></div>
    </div>

    <!-- Current sequence -->
    <div class="steps-label" style="margin-top:6px">📝 你排嘅順序</div>
    <div class="seq-row" id="seqRow">
      <div class="seq-empty">㩒上面嘅步驟，排好順序</div>
    </div>

    <!-- Action hint -->
    <div class="action-hint" id="hint">👆 㩒步驟排好正確次序</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <button class="ctrl btn-check" id="checkBtn">✅ 檢查</button>
    <button class="ctrl btn-reset" id="resetBtn">🔄 重新</button>
    <button class="ctrl btn-next" id="nextBtn">➡️ 下一關</button>

</div>

let curLevel = 0;
let sequence = [];
let isChecking = false;

function loadLevel(idx) {
  curLevel = idx;
  const lv = LEVELS[idx];
  document.getElementById('lvBadge').textContent = `第 ${idx+1} 關`;
  document.getElementById('sceneIcon').textContent = lv.icon;
  document.getElementById('sceneTitle').textContent = lv.title;
  document.getElementById('sceneDesc').innerHTML = lv.desc;
  document.getElementById('nextBtn').className = 'ctrl btn-next';
  document.getElementById('checkBtn').disabled = false;
  document.getElementById('checkBtn').textContent = '✅ 檢查';
  document.getElementById('hint').textContent = '👆 㩒步驟排好正確次序';
  document.getElementById('hint').className = 'action-hint';

  // Reset char
  document.getElementById('charBig').className = 'char-big';
  document.getElementById('charBig').textContent = lv.char;
  document.getElementById('charResult').textContent = '';

  // Remove any success overlay
  const oldOverlay = document.querySelector('.success-overlay');
  if (oldOverlay) oldOverlay.remove();

  sequence = [];
  renderSteps(lv);
  renderSequence();
}

function renderSteps(lv) {
  const tray = document.getElementById('stepsTray');
  tray.innerHTML = '';
  const shuffled = lv.steps.map((s,i) => ({...s, origIdx: i}));
  // Fisher-Yates shuffle
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }

  shuffled.forEach((step) => {
    const chip = document.createElement('div');
    chip.className = 'step-chip';
    chip.style.background = '#fff';
    chip.style.border = '2px solid #e0e6f0';
    chip.innerHTML = `<span class="emoji">${step.emoji}</span> ${step.text}`;
    chip.dataset.origIdx = step.origIdx;
    chip.onclick = () => addToSequence(step.origIdx);
    tray.appendChild(chip);
  });
}

function addToSequence(origIdx) {
  if (isChecking) return;
  const lv = LEVELS[curLevel];
  if (sequence.length >= lv.steps.length) return;
  // Check if already in sequence
  if (sequence.includes(origIdx)) return;
  sequence.push(origIdx);
  renderSequence();
  document.getElementById('hint').textContent = `已排 ${sequence.length}/${lv.steps.length} 個步驟`;
  if (sequence.length === lv.steps.length) {
    document.getElementById('hint').textContent = '✅ 排好晒！㩒「檢查」睇下啱唔啱！';
    document.getElementById('hint').className = 'action-hint ok';
  }
}

function removeFromSeq(idx) {
  if (isChecking) return;
  sequence.splice(idx, 1);
  renderSequence();
  const lv = LEVELS[curLevel];
  document.getElementById('hint').textContent = `已排 ${sequence.length}/${lv.steps.length} 個步驟`;
  document.getElementById('hint').className = 'action-hint';
}

function renderSequence() {
  const row = document.getElementById('seqRow');
  row.innerHTML = '';
  const lv = LEVELS[curLevel];

  if (sequence.length === 0) {
    row.innerHTML = '<div class="seq-empty">㩒上面嘅步驟，排好順序</div>';
    return;
  }

  sequence.forEach((origIdx, i) => {
    const step = lv.steps[origIdx];
    const slot = document.createElement('div');
    slot.className = 'seq-slot';
    slot.innerHTML = `${step.emoji} ${step.text} <button class="x">✕</button>`;
    slot.querySelector('.x').onclick = (e) => { e.stopPropagation(); removeFromSeq(i); };
    row.appendChild(slot);

    // Add arrow between
    if (i < sequence.length - 1) {
      const arrow = document.createElement('span');
      arrow.className = 'seq-arrow';
      arrow.textContent = '→';
      row.appendChild(arrow);
    }
  });
}

// Check
document.getElementById('checkBtn').addEventListener('click', checkAnswer);

async function checkAnswer() {
  if (isChecking) return;
  const lv = LEVELS[curLevel];

  if (sequence.length !== lv.steps.length) {
    document.getElementById('hint').textContent = `仲爭 ${lv.steps.length - sequence.length} 個步驟未排呀！`;
    document.getElementById('hint').className = 'action-hint fail';
    return;
  }

  isChecking = true;
  document.getElementById('checkBtn').disabled = true;
  document.getElementById('checkBtn').textContent = '⏳ 檢查中...';

  // Check if correct
  let correct = true;
  for (let i = 0; i < lv.correct.length; i++) {
    if (sequence[i] !== lv.correct[i]) {
      correct = false;
      break;
    }
  }

  if (correct) {
    // Success! Animate through steps
    const charBig = document.getElementById('charBig');
    const charResult = document.getElementById('charResult');

    for (let i = 0; i < lv.anims.length; i++) {
      const a = lv.anims[i];
      charBig.textContent = a.emoji;
      charResult.textContent = a.text;

      // Highlight current slot
      const slots = document.querySelectorAll('.seq-slot');
      if (slots[i]) {
        slots[i].classList.remove('active-slot');
        // Force reflow
        void slots[i].offsetWidth;
        slots[i].classList.add('active-slot');
      }

      await sleep(600);
      if (slots[i]) slots[i].classList.remove('active-slot');
    }

    // Final celebration
    charBig.textContent = lv.finalEmoji;
    charBig.classList.add('done');
    charResult.textContent = lv.finalText;

    document.getElementById('hint').textContent = '🎉 啱晒！你係生活小管家！';
    document.getElementById('hint').className = 'action-hint ok';
    spawnConfetti();

    // Show next button
    if (curLevel < LEVELS.length - 1) {
      document.getElementById('nextBtn').classList.add('show');
    } else {
      document.getElementById('hint').textContent = '🏆 全部完成！你係排序小高手！';
    }
  } else {
    // Wrong order
    document.getElementById('hint').textContent = '😅 次序唔啱喎⋯⋯再排過啦！';
    document.getElementById('hint').className = 'action-hint fail';
  }

  document.getElementById('checkBtn').disabled = false;
  document.getElementById('checkBtn').textContent = '✅ 檢查';
  isChecking = false;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// Reset
document.getElementById('resetBtn').addEventListener('click', () => {
  if (isChecking) return;
  sequence = [];
  renderSequence();
  const lv = LEVELS[curLevel];
  document.getElementById('charBig').className = 'char-big';
  document.getElementById('charBig').textContent = lv.char;
  document.getElementById('charResult').textContent = '';
  document.getElementById('hint').textContent = '🔄 重新排過啦！';
  document.getElementById('hint').className = 'action-hint';
});

// Next
document.getElementById('nextBtn').addEventListener('click', () => {
  if (curLevel < LEVELS.length - 1) {
    loadLevel(curLevel + 1);
  }
});

// Confetti
function spawnConfetti() {
  const c = document.createElement('div');
  c.className = 'cf-c';
  document.body.appendChild(c);
  const colors = ['#667eea','#48bb78','#f6ad55','#fc8181','#9f7aea','#4299e1','#ed64a6'];
  for (let i = 0; i < 40; i++) {
    const p = document.createElement('div');
    p.className = 'cf-p';
    p.style.left = Math.random()*100+'%';
    p.style.background = colors[Math.floor(Math.random()*colors.length)];
    p.style.animationDelay = Math.random()*0.8+'s';
    p.style.animationDuration = (2+Math.random()*1.5)+'s';
    c.appendChild(p);
  }
  setTimeout(() => c.remove(), 3500);
}

// Init
loadLevel(0);
</script>
</body>
</html>
